<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hà Nội Dịu Dàng</title>
  <meta name="description" content="Một góc Hà Nội trong ánh nắng mùa thu — Album ảnh nghệ thuật">
  <meta property="og:title" content="Hà Nội Dịu Dàng">
  <meta property="og:description" content="Album ảnh nghệ thuật Hà Nội dịu dàng">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-bg:      #F2DCE8;
      --pink-light:   #EBC8D8;
      --pink-accent:  #C9869A;
      --pink-dark:    #B06B7F;
      --blue-lav:     #B5C7D3;
      --blue-sea:     #8AACC8;
      --green-light:  #A8BFA0;
      --gold-light:   #D4AF7A;
      --cream:        #FAF7F4;
      --brown-dark:   #3D3029;
      --brown-light:  #8B7355;
      --white:        #FFFFFF;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--brown-dark);
      background: var(--cream);
      line-height: 1.6;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    /* ===== HERO SECTION ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(242,220,232,0.65) 0%,
        rgba(245,247,244,0.70) 40%,
        rgba(181,199,211,0.25) 70%,
        rgba(242,220,232,0.55) 100%
      );
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 20px;
      animation: fadeInUp 1.2s ease-out;
    }

    .hero-title {
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700;
      color: var(--brown-dark);
      text-shadow: 0 2px 24px rgba(201,134,154,0.25);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: var(--brown-light);
      margin-top: 16px;
      font-style: italic;
      font-family: 'Playfair Display', serif;
      animation: fadeInUp 1.2s ease-out 0.3s both;
    }

    /* Music toggle button */
    .music-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,134,154,0.5);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(8px);
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--pink-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .music-toggle:hover {
      background: rgba(255,255,255,0.9);
      border-color: var(--pink-accent);
      transform: scale(1.05);
    }

    .music-toggle.playing {
      background: var(--pink-accent);
      color: var(--white);
      border-color: var(--pink-accent);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 1.5rem;
      color: var(--brown-light);
      animation: bounce 2s infinite;
      opacity: 0.6;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== SECTION COMMON ===== */
    .section {
      padding: 80px 20px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      text-align: center;
      margin-bottom: 48px;
      color: var(--brown-dark);
      position: relative;
    }

    .section-title::after {
      content: '🌸';
      display: block;
      font-size: 1.2rem;
      margin-top: 12px;
      opacity: 0.6;
    }

    /* ===== ALBUM DATASET ===== */
    .album-dataset {
      background: linear-gradient(180deg, var(--cream) 0%, var(--pink-light) 100%);
    }

    .photo-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .photo-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1;
      background: var(--pink-light);
      box-shadow: 0 4px 16px rgba(61,48,41,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .photo-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 32px rgba(61,48,41,0.18);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== UPLOAD SECTION ===== */
    .upload-section {
      background: linear-gradient(180deg, var(--pink-light) 0%, var(--blue-lav) 100%);
    }

    .upload-container {
      max-width: 720px;
      margin: 0 auto;
    }

    .upload-zone {
      border: 2px dashed var(--pink-accent);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-style: solid;
      background: rgba(201,134,154,0.1);
      transform: scale(1.01);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .upload-text {
      font-size: 1.1rem;
      color: var(--brown-light);
    }

    .upload-text strong {
      color: var(--pink-accent);
    }

    /* Preview area */
    .preview-area {
      display: none;
      margin-top: 24px;
      text-align: center;
    }

    .preview-area.active { display: block; }

    .preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .preview-item {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 12px;
      overflow: hidden;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(176,107,127,0.85);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-save {
      display: inline-block;
      background: var(--pink-accent);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1.05rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn-save:hover {
      background: var(--pink-dark);
      transform: scale(1.03);
      opacity: 0.9;
    }

    /* ===== PERSONAL ALBUM ===== */
    .album-personal {
      background: linear-gradient(180deg, var(--blue-lav) 0%, var(--cream) 100%);
    }

    .personal-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .personal-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1;
      box-shadow: 0 4px 16px rgba(61,48,41,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .personal-item:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 32px rgba(61,48,41,0.18);
    }

    .personal-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .personal-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(176,107,127,0.85);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .personal-item:hover .personal-delete { display: flex; }
    .personal-delete:hover { background: #8B3A4A; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--brown-light);
    }

    .empty-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
    .empty-text { font-size: 1.05rem; }

    /* ===== LIGHTBOX ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
    }

    .lightbox.active { display: flex; }

    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: lightboxIn 0.3s ease-out;
    }

    @keyframes lightboxIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 2rem;
      color: white;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s;
      z-index: 1001;
    }
    .lightbox-close:hover { opacity: 1; }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2.5rem;
      color: white;
      background: rgba(255,255,255,0.1);
      border: none;
      cursor: pointer;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: opacity 0.2s, background 0.2s;
      z-index: 1001;
    }
    .lightbox-nav:hover { opacity: 1; background: rgba(255,255,255,0.2); }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    /* ===== FOOTER ===== */
    .footer {
      background: linear-gradient(180deg, var(--pink-light) 0%, var(--blue-lav) 100%);
      padding: 48px 20px;
      text-align: center;
    }

    .footer-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--brown-dark);
    }

    .footer-divider {
      width: 60px;
      height: 2px;
      background: var(--pink-accent);
      margin: 20px auto;
      border-radius: 2px;
    }

    .footer-copy {
      font-size: 0.9rem;
      color: var(--brown-light);
    }

    /* ===== SCROLL REVEAL ===== */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .photo-grid, .personal-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .photo-grid, .personal-grid { grid-template-columns: 1fr; }
      .section { padding: 60px 16px; }
      .upload-zone { padding: 40px 20px; }
    }

    /* ===== AUDIO (hidden) ===== */
    #bgMusic { display: none; }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero" id="hero">
    <video class="hero-video" autoplay muted loop playsinline id="heroVideo">
      <source src="assets/video/background.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">Hà Nội Dịu Dàng</h1>
      <p class="hero-subtitle">Một góc Hà Nội trong ánh nắng mùa thu</p>
    </div>
    <button class="music-toggle" id="musicToggle" title="Bật nhạc nền" aria-label="Bật/tắt nhạc nền">♪</button>
    <div class="scroll-hint">↓</div>
  </section>

  <!-- Hidden audio element -->
  <audio id="bgMusic" loop>
    <source src="assets/music/music.mp3" type="audio/mpeg">
  </audio>

  <!-- ALBUM DATASET -->
  <section class="section album-dataset" id="dataset">
    <h2 class="section-title reveal">Góc Hà Nội</h2>
    <div class="photo-grid" id="datasetGrid">
      <!-- Ảnh được render bằng JS -->
    </div>
  </section>

  <!-- UPLOAD -->
  <section class="section upload-section" id="upload">
    <h2 class="section-title reveal">Khoảnh Khắc Của Bạn</h2>
    <div class="upload-container reveal">
      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">📷</span>
        <p class="upload-text">
          Kéo thả ảnh vào đây hoặc <strong>click để chọn</strong><br>
          <small>Hỗ trợ JPG, PNG, WebP</small>
        </p>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div class="preview-area" id="previewArea">
        <div class="preview-grid" id="previewGrid"></div>
        <button class="btn-save" id="btnSave">💾 Lưu Album Riêng</button>
      </div>
    </div>
  </section>

  <!-- PERSONAL ALBUM -->
  <section class="section album-personal" id="personal">
    <h2 class="section-title reveal">Album Của Bạn</h2>
    <div class="personal-grid" id="personalGrid">
      <!-- Rendered by JS -->
    </div>
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">🌸</span>
      <p class="empty-text">Chưa có ảnh nào trong album riêng của bạn</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-divider"></div>
    <p class="footer-text">Một góc Hà Nội</p>
    <p class="footer-copy">© 2026 — Hà Nội Dịu Dàng</p>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="Đóng">×</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Ảnh trước">‹</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Ảnh sau">›</button>
  </div>

  <script>
    /* ===== DATASET IMAGES LIST ===== */
    const datasetImages = [
      "assets/images/z7739133483170_04b05f6229351f95ebfcddc5c1c462a8.jpg",

    ];

    /* ===== INDEXEDDB ===== */
    const DB_NAME = 'hanoi_album_db';
    const DB_VERSION = 1;
    const STORE_NAME = 'images';
    let db = null;

    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => { db = request.result; resolve(db); };
        request.onupgradeneeded = (e) => {
          const database = e.target.result;
          if (!database.objectStoreNames.contains(STORE_NAME)) {
            database.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
      });
    }

    function saveImages(images) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        images.forEach(img => store.put(img));
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    function getAllImages() {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function deleteImage(id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    /* ===== RENDER DATASET GRID ===== */
    function renderDataset() {
      const grid = document.getElementById('datasetGrid');
      grid.innerHTML = datasetImages.map((src, i) => `
        <div class="photo-item" data-index="${i}">
          <img src="${src}" alt="Hà Nội ${i + 1}" loading="lazy">
        </div>
      `).join('');
    }

    /* ===== RENDER PERSONAL ALBUM ===== */
    async function renderPersonal() {
      const grid = document.getElementById('personalGrid');
      const empty = document.getElementById('emptyState');
      try {
        const images = await getAllImages();
        if (images.length === 0) {
          grid.innerHTML = '';
          empty.style.display = 'block';
        } else {
          empty.style.display = 'none';
          grid.innerHTML = images.map(img => `
            <div class="personal-item" data-id="${img.id}">
              <img src="${img.dataUrl}" alt="Ảnh riêng">
              <button class="personal-delete" title="Xóa ảnh">×</button>
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Error loading personal album:', e);
      }
    }

    /* ===== LIGHTBOX ===== */
    let currentIndex = 0;
    let allImages = [];

    function openLightbox(index, images) {
      allImages = images;
      currentIndex = index;
      showLightboxImg();
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function showLightboxImg() {
      document.getElementById('lightboxImg').src = allImages[currentIndex].src || allImages[currentIndex];
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function lightboxPrev() {
      currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
      showLightboxImg();
    }

    function lightboxNext() {
      currentIndex = (currentIndex + 1) % allImages.length;
      showLightboxImg();
    }

    // Lightbox events
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', lightboxPrev);
    document.getElementById('lightboxNext').addEventListener('click', lightboxNext);
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lightboxPrev();
      if (e.key === 'ArrowRight') lightboxNext();
    });

    // Dataset grid click → lightbox
    document.getElementById('datasetGrid').addEventListener('click', (e) => {
      const item = e.target.closest('.photo-item');
      if (!item) return;
      const index = parseInt(item.dataset.index);
      const images = datasetImages.map(src => ({ src }));
      openLightbox(index, images);
    });

    // Personal album click → lightbox
    document.getElementById('personalGrid').addEventListener('click', async (e) => {
      // Delete button
      if (e.target.classList.contains('personal-delete')) {
        e.stopPropagation();
        const item = e.target.closest('.personal-item');
        const id = item.dataset.id;
        await deleteImage(id);
        await renderPersonal();
        return;
      }
      // View image
      const item = e.target.closest('.personal-item');
      if (!item) return;
      const id = item.dataset.id;
      const images = await getAllImages();
      const index = images.findIndex(img => img.id === id);
      openLightbox(index, images.map(img => ({ src: img.dataUrl })));
    });

    /* ===== UPLOAD ZONE ===== */
    let pendingFiles = [];

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const previewGrid = document.getElementById('previewGrid');
    const btnSave = document.getElementById('btnSave');

    // Drag over
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    // Click to browse
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(files) {
      pendingFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (pendingFiles.length === 0) return;
      renderPreviews();
    }

    function renderPreviews() {
      previewArea.classList.add('active');
      previewGrid.innerHTML = '';
      pendingFiles.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = `
            <img src="${e.target.result}" alt="Preview ${i}">
            <button class="preview-remove" data-idx="${i}">×</button>
          `;
          previewGrid.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    }

    // Remove preview
    previewGrid.addEventListener('click', (e) => {
      if (!e.target.classList.contains('preview-remove')) return;
      const idx = parseInt(e.target.dataset.idx);
      pendingFiles.splice(idx, 1);
      if (pendingFiles.length === 0) {
        previewArea.classList.remove('active');
      } else {
        renderPreviews();
      }
    });

    // Save to IndexedDB
    btnSave.addEventListener('click', async () => {
      if (pendingFiles.length === 0) return;
      btnSave.textContent = '⏳ Đang lưu...';
      btnSave.disabled = true;
      const imagesToSave = await Promise.all(pendingFiles.map(file => {
        return new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = (e) => {
            resolve({ id: Date.now() + Math.random(), dataUrl: e.target.result, addedAt: Date.now() });
          };
          reader.readAsDataURL(file);
        });
      }));
      try {
        await saveImages(imagesToSave);
        pendingFiles = [];
        previewArea.classList.remove('active');
        fileInput.value = '';
        await renderPersonal();
        btnSave.textContent = '💾 Lưu Album Riêng';
        btnSave.disabled = false;
        // Scroll to personal album
        document.getElementById('personal').scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        console.error(e);
        btnSave.textContent = '❌ Lỗi! Thử lại';
        btnSave.disabled = false;
      }
    });

    /* ===== MUSIC TOGGLE ===== */
    const musicToggle = document.getElementById('musicToggle');
    const bgMusic = document.getElementById('bgMusic');
    let musicPlaying = false;

    musicToggle.addEventListener('click', () => {
      if (musicPlaying) {
        bgMusic.pause();
        musicToggle.classList.remove('playing');
        musicToggle.textContent = '♪';
      } else {
        bgMusic.volume = 0.3;
        bgMusic.play().catch(() => {});
        musicToggle.classList.add('playing');
        musicToggle.textContent = '🔊';
      }
      musicPlaying = !musicPlaying;
    });

    /* ===== SCROLL REVEAL ===== */
    const revealEls = document.querySelectorAll('.reveal');
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    revealEls.forEach(el => revealObserver.observe(el));

    /* ===== INIT ===== */
    (async () => {
      try {
        await initDB();
        renderDataset();
        await renderPersonal();
      } catch (e) {
        console.error('Init error:', e);
      }
    })();
  </script>
</body>
</html>
